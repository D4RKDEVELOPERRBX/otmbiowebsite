<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D4RKDEVELOPER</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #060608;
      --surface:   #0d0d10;
      --surface2:  #141418;
      --surface3:  #1a1a1f;
      --border:    #1e1e24;
      --border2:   #272730;
      --gold:      #C9A84C;
      --gold-l:    #E8C97A;
      --gold-d:    #8A6E2A;
      --text:      #EEEAE3;
      --text2:     #A09890;
      --muted:     #4A4640;
      --radius:    12px;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 64px 20px 96px;
      overflow-x: hidden;
      cursor: none;
    }

    #cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: width 0.18s, height 0.18s;
    }
    #cursor-ring {
      position: fixed;
      width: 32px; height: 32px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.22s, height 0.22s, border-color 0.22s;
    }
    body.hovering #cursor { width: 16px; height: 16px; }
    body.hovering #cursor-ring { width: 48px; height: 48px; border-color: var(--gold); }

    #particle-canvas {
      position: fixed; inset: 0;
      pointer-events: none;
      z-index: 0; opacity: 0.3;
    }

    body::before {
      content: '';
      position: fixed;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 420px;
      background: radial-gradient(ellipse, rgba(201,168,76,0.055) 0%, transparent 68%);
      pointer-events: none; z-index: 0;
    }

    .card {
      position: relative; z-index: 1;
      width: 100%; max-width: 480px;
      display: flex; flex-direction: column;
      gap: 6px;
    }

    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── PROFILE ─────────────────────────────────── */
    .profile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px 32px 32px;
      text-align: center;
      position: relative; overflow: hidden;
      will-change: transform;
    }
    .profile-topline {
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent 5%, var(--gold) 50%, transparent 95%);
      opacity: 0.5;
    }
    .profile-shine {
      position: absolute; inset: 0;
      background: radial-gradient(circle at var(--mx,50%) var(--my,50%), rgba(201,168,76,0.055) 0%, transparent 55%);
      pointer-events: none; border-radius: var(--radius);
    }

    .avatar-wrap { position: relative; width: 96px; margin: 0 auto 22px; }
    .avatar-ring {
      width: 96px; height: 96px; border-radius: 50%; padding: 2px;
      background: conic-gradient(from 0deg, var(--gold-d), var(--gold), var(--gold-l), var(--gold), var(--gold-d));
      animation: ring-spin 10s linear infinite;
    }
    @keyframes ring-spin { to { filter: hue-rotate(20deg); } }
    .avatar-inner { width: 100%; height: 100%; border-radius: 50%; overflow: hidden; background: var(--surface2); }
    .avatar-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .avatar-status {
      position: absolute; bottom: 3px; right: 3px;
      width: 17px; height: 17px; border-radius: 50%;
      background: #22c55e; border: 2.5px solid var(--surface);
      box-shadow: 0 0 10px rgba(34,197,94,0.6);
    }

    .profile-name {
      font-family: 'DM Serif Display', serif;
      font-size: 2rem; font-weight: 400;
      color: var(--text); margin-bottom: 5px; letter-spacing: 0.01em;
    }
    .profile-tag {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem; font-weight: 500; letter-spacing: 0.04em;
      color: var(--gold); margin-bottom: 16px;
      cursor: pointer; transition: opacity 0.2s; user-select: none;
    }
    .profile-tag:hover { opacity: 0.7; }

    .divider { width: 36px; height: 1px; background: var(--gold-d); margin: 0 auto 14px; opacity: 0.45; }

    .profile-bio {
      font-size: 0.845rem; color: var(--text2);
      line-height: 1.8; max-width: 300px;
      margin: 0 auto; font-weight: 300; min-height: 1.5em;
    }
    .typing-cursor {
      display: inline-block; width: 1.5px; height: 0.9em;
      background: var(--gold); margin-left: 2px;
      vertical-align: text-bottom; animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .stats-row {
      display: flex; justify-content: center;
      margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);
    }
    .stat { flex: 1; text-align: center; padding: 0 8px; position: relative; }
    .stat + .stat::before {
      content: ''; position: absolute; left: 0; top: 15%; height: 70%;
      width: 1px; background: var(--border2);
    }
    .stat-num { font-family: 'DM Serif Display', serif; font-size: 1.55rem; color: var(--gold); display: block; line-height: 1; }
    .stat-label { font-size: 0.58rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-top: 5px; display: block; }

    .visitor-badge {
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 18px; font-size: 0.66rem; font-weight: 500;
      letter-spacing: 0.06em; color: var(--text2);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 13px;
    }
    .visitor-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #4ade80; box-shadow: 0 0 6px rgba(74,222,128,0.8);
      animation: pdot 2s ease infinite;
    }
    @keyframes pdot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.7)} }

    /* ── SECTION LABEL ───────────────────────────── */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted); padding: 20px 2px 7px;
    }
    .section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── SKILLS ──────────────────────────────────── */
    .skills-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 20px 22px;
      display: flex; flex-direction: column; gap: 15px;
    }
    .skill-row { display: flex; flex-direction: column; gap: 7px; }
    .skill-meta { display: flex; justify-content: space-between; align-items: center; }
    .skill-name { font-size: 0.8rem; font-weight: 500; color: var(--text); }
    .skill-pct { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--gold); }
    .skill-track { height: 3px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
    .skill-fill {
      height: 100%; background: linear-gradient(90deg, var(--gold-d), var(--gold-l));
      border-radius: 99px; width: 0; transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
    }

    /* ── SHOWCASE (TABBED) ───────────────────────── */
    .showcase-shell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-btn {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 7px;
      padding: 13px 18px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      color: var(--muted);
      background: transparent; border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.2s, border-color 0.2s;
      white-space: nowrap;
    }
    .tab-btn svg { flex-shrink: 0; transition: color 0.2s; }
    .tab-btn:hover { color: var(--text2); }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    .tab-panels { position: relative; }

    .tab-panel {
      display: none;
      padding: 16px;
      animation: fadeTab 0.25s ease both;
    }
    .tab-panel.active { display: block; }
    @keyframes fadeTab { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

    .tab-empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px;
      padding: 40px 20px; color: var(--muted);
      font-size: 0.8rem; font-weight: 500; text-align: center;
    }
    .tab-empty svg { opacity: 0.3; }

    .creation-list { display: flex; flex-direction: column; gap: 10px; }

    .creation-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.18s;
      position: relative;
    }
    .creation-card:hover { border-color: rgba(201,168,76,0.35); transform: translateY(-1px); }

    .creation-img-wrap {
      width: 100%; aspect-ratio: 16/9;
      background: var(--surface3);
      overflow: hidden; position: relative;
    }
    .creation-img-wrap img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      transition: transform 0.35s ease;
    }
    .creation-card:hover .creation-img-wrap img { transform: scale(1.03); }

    .creation-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
    }

    .creation-body { padding: 14px 16px; }

    .creation-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 10px;
      margin-bottom: 6px;
    }

    .creation-title { font-size: 0.9rem; font-weight: 700; color: var(--text); }

    .creation-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem; color: var(--muted); white-space: nowrap; margin-top: 2px;
    }

    .creation-desc { font-size: 0.76rem; color: var(--text2); line-height: 1.6; font-weight: 300; }

    .creation-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .creation-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.57rem; font-weight: 500; letter-spacing: 0.07em;
      text-transform: uppercase; color: var(--gold);
      background: rgba(201,168,76,0.07);
      border: 1px solid rgba(201,168,76,0.16);
      border-radius: 4px; padding: 2px 7px;
    }

    /* lightbox */
    .lightbox {
      position: fixed; inset: 0; z-index: 8000;
      background: rgba(6,6,8,0.92);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s;
      backdrop-filter: blur(6px);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    .lightbox-inner {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      max-width: 620px; width: calc(100% - 40px);
      max-height: 90vh; overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.22s;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }
    .lightbox.open .lightbox-inner { transform: scale(1); }

    .lightbox-img {
      width: 100%; aspect-ratio: 16/9;
      object-fit: cover; display: block;
      border-radius: var(--radius) var(--radius) 0 0;
      background: var(--surface3);
    }
    .lightbox-img-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: var(--surface3);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); border-radius: var(--radius) var(--radius) 0 0;
    }

    .lightbox-body { padding: 22px 24px 26px; }
    .lightbox-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem; color: var(--text); margin-bottom: 8px;
    }
    .lightbox-desc { font-size: 0.83rem; color: var(--text2); line-height: 1.75; font-weight: 300; }
    .lightbox-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 14px; }

    .lightbox-close {
      position: absolute; top: 14px; right: 14px;
      width: 32px; height: 32px;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text2);
      transition: color 0.2s, background 0.2s;
    }
    .lightbox-close:hover { background: var(--surface3); color: var(--text); }

    /* ── LINKS ───────────────────────────────────── */
    .link-btn {
      display: flex; align-items: center; gap: 13px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px;
      color: var(--text); text-decoration: none;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      width: 100%; text-align: left;
      font-family: 'Outfit', sans-serif;
      position: relative; overflow: hidden;
    }
    .link-btn:hover { border-color: rgba(201,168,76,0.35); background: var(--surface2); transform: translateY(-1px); }

    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(201,168,76,0.12);
      transform: scale(0);
      animation: ripple-anim 0.55s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    .btn-icon {
      width: 38px; height: 38px; border-radius: 9px;
      background: var(--surface2); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; color: var(--gold); transition: background 0.2s;
    }
    .link-btn:hover .btn-icon { background: var(--surface3); }

    .btn-text { flex: 1; }
    .btn-title { display: block; font-size: 0.86rem; font-weight: 600; color: var(--text); }
    .btn-sub   { display: block; font-size: 0.71rem; color: var(--text2); margin-top: 2px; font-weight: 300; }

    .btn-arrow { color: var(--muted); transition: color 0.2s, transform 0.2s; flex-shrink: 0; }
    .link-btn:hover .btn-arrow { color: var(--gold); transform: translateX(4px); }

    /* ── PRICING ─────────────────────────────────── */
    .pay-btn {
      display: flex; align-items: center; gap: 13px;
      background: transparent; border: 1px solid rgba(201,168,76,0.2);
      border-radius: var(--radius); padding: 14px 16px;
      cursor: pointer; width: 100%; color: var(--text); text-align: left;
      transition: border-color 0.2s, background 0.2s, transform 0.15s, box-shadow 0.2s;
      font-family: 'Outfit', sans-serif; position: relative; overflow: hidden;
    }
    .pay-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(201,168,76,0.055), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .pay-btn:hover { border-color: rgba(201,168,76,0.6); transform: translateY(-1px); box-shadow: 0 4px 24px rgba(201,168,76,0.09); }
    .pay-btn:hover::before { opacity: 1; }

    .pay-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.54rem; font-weight: 500; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--gold);
      background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.18);
      border-radius: 4px; padding: 2px 6px; margin-top: 3px; display: inline-block;
    }
    .pay-btn .btn-arrow { color: rgba(201,168,76,0.3); }
    .pay-btn:hover .btn-arrow { color: var(--gold); transform: translateX(4px); }

    /* ── TOAST ───────────────────────────────────── */
    #toast-container {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%); z-index: 9990;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: var(--surface); border: 1px solid var(--border2);
      border-left: 2px solid var(--gold); border-radius: 9px;
      padding: 9px 16px; font-size: 0.76rem; font-weight: 500;
      color: var(--text); white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.55);
      animation: toastIn 0.28s ease both, toastOut 0.28s ease 2.4s both;
    }
    @keyframes toastIn  { from{opacity:0;transform:translateY(10px) scale(.96)} to{opacity:1;transform:none} }
    @keyframes toastOut { from{opacity:1} to{opacity:0;transform:translateY(-8px) scale(.96)} }

    .footer {
      margin-top: 52px; font-size: 0.65rem;
      font-family: 'DM Mono', monospace; color: var(--muted);
      text-align: center; letter-spacing: 0.07em; opacity: 0.5;
      position: relative; z-index: 1;
    }

    @media (max-width: 420px) {
      .profile { padding: 32px 18px 26px; }
      body { cursor: auto; }
      #cursor, #cursor-ring { display: none; }
    }
  </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-ring"></div>
<canvas id="particle-canvas"></canvas>
<div id="toast-container"></div>

<div id="lightbox" class="lightbox">
  <div class="lightbox-inner" id="lightbox-inner"></div>
  <button class="lightbox-close" id="lightbox-close" aria-label="Close">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</div>

<div class="card" id="card"></div>
<div class="footer" id="footer-el"></div>

<script>

(function build() {

    ? '<img src="' + CONFIG.avatarUrl + '" alt="' + CONFIG.name + '">'
    : '<span style="display:flex;align-items:center;justify-content:center;height:100%;font-family:\'DM Serif Display\',serif;font-size:2rem;color:var(--gold)">' + CONFIG.avatarInit + '</span>';

    return '<div class="stat"><span class="stat-num">' + s.num + '</span><span class="stat-label">' + s.label + '</span></div>';
  }).join('');

  card.appendChild(makeEl("div", "profile reveal",
    '<div class="profile-topline"></div>' +
    '<div class="profile-shine" id="profile-shine"></div>' +
    '<div class="avatar-wrap"><div class="avatar-ring"><div class="avatar-inner">' + avatarInner + '</div></div><div class="avatar-status"></div></div>' +

    '<div class="profile-tag" id="copy-tag">' + CONFIG.username + ICONS.copy + '</div>' +

  ));

  card.appendChild(makeLabel("Skills"));
  var skillsCard = makeEl("div", "skills-card reveal", '');
  CONFIG.skills.forEach(function(sk) {
    skillsCard.appendChild(makeEl("div", "skill-row",
      '<div class="skill-meta"><span class="skill-name">' + sk.name + '</span><span class="skill-pct">' + sk.pct + '%</span></div>' +
      '<div class="skill-track"><div class="skill-fill" data-pct="' + sk.pct + '"></div></div>'
    ));

  card.appendChild(skillsCard);

  card.appendChild(makeLabel("Showcase"));
  card.appendChild(buildShowcase());

  card.appendChild(makeLabel("Links"));
  CONFIG.links.forEach(function(link) {

function buildShowcase() {
  var shell = makeEl("div", "showcase-shell reveal", '');

  var tabBar = makeEl("div", "tab-bar", '');
  var panels = makeEl("div", "tab-panels", '');

  CONFIG.showcase.forEach(function(tab, i) {
    var btn = makeEl("button", "tab-btn" + (i === 0 ? " active" : ""),
      (ICONS[tab.iconKey] || '') + tab.label
    );
    btn.dataset.tab = tab.id;
    btn.addEventListener("click", function() {
      tabBar.querySelectorAll(".tab-btn").forEach(function(b) { b.classList.remove("active"); });
      panels.querySelectorAll(".tab-panel").forEach(function(p) { p.classList.remove("active"); });
      btn.classList.add("active");
      document.getElementById("panel-" + tab.id).classList.add("active");
    });
    tabBar.appendChild(btn);

    var panel = makeEl("div", "tab-panel" + (i === 0 ? " active" : ""), '');
    panel.id = "panel-" + tab.id;

    if (!tab.items || tab.items.length === 0) {
      panel.appendChild(makeEl("div", "tab-empty",
        ICONS.image + '<span>No creations yet in this category.</span>'
      ));
    } else {
      var list = makeEl("div", "creation-list", '');
      tab.items.forEach(function(item) {
        list.appendChild(buildCreationCard(item));
      });
      panel.appendChild(list);
    }
    panels.appendChild(panel);
  });

  shell.appendChild(tabBar);
  shell.appendChild(panels);
  return shell;
}

function buildCreationCard(item) {
  var card = makeEl("div", "creation-card", '');

  var imgWrap = makeEl("div", "creation-img-wrap", '');
  if (item.imageUrl) {
    var img = document.createElement("img");
    img.src = item.imageUrl; img.alt = item.title;
    imgWrap.appendChild(img);
  } else {
    imgWrap.appendChild(makeEl("div", "creation-img-placeholder", ICONS.image));
  }

  var tagsHTML = (item.tags || []).map(function(t) {
    return '<span class="creation-tag">' + t + '</span>';
  }).join('');

  var body = makeEl("div", "creation-body",
    '<div class="creation-header">' +
      '<span class="creation-title">' + item.title + '</span>' +
      (item.date ? '<span class="creation-date">' + item.date + '</span>' : '') +
    '</div>' +
    '<div class="creation-desc">' + item.desc + '</div>' +
    (tagsHTML ? '<div class="creation-tags">' + tagsHTML + '</div>' : '')
  );

  card.appendChild(imgWrap);
  card.appendChild(body);

  card.addEventListener("click", function(e) {
    createRippleAt(card, e);
    openLightbox(item);
  });

  return card;
}

function initLightbox() {
  var lb = document.getElementById("lightbox");
  document.getElementById("lightbox-close").addEventListener("click", closeLightbox);
  lb.addEventListener("click", function(e) { if (e.target === lb) closeLightbox(); });
  document.addEventListener("keydown", function(e) { if (e.key === "Escape") closeLightbox(); });
}

function openLightbox(item) {
  var inner = document.getElementById("lightbox-inner");
  var tagsHTML = (item.tags || []).map(function(t) {
    return '<span class="creation-tag">' + t + '</span>';
  }).join('');

  var imgHTML = item.imageUrl
    ? '<img class="lightbox-img" src="' + item.imageUrl + '" alt="' + item.title + '">'
    : '<div class="lightbox-img-placeholder">' + ICONS.image + '</div>';

  inner.innerHTML = imgHTML +
    '<div class="lightbox-body">' +
      '<div class="lightbox-title">' + item.title + '</div>' +
      (item.date ? '<div style="font-family:\'DM Mono\',monospace;font-size:.62rem;color:var(--muted);margin-bottom:10px">' + item.date + '</div>' : '') +
      '<div class="lightbox-desc">' + item.desc + '</div>' +
      (tagsHTML ? '<div class="lightbox-tags">' + tagsHTML + '</div>' : '') +
    '</div>';

  document.getElementById("lightbox").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeLightbox() {
  document.getElementById("lightbox").classList.remove("open");
  document.body.style.overflow = "";
}

function makeEl(tag, cls, html) {
  var e = document.createElement(tag);
  e.className = cls; e.innerHTML = html; return e;
}

function makeLabel(text) {
  return makeEl("div", "section-label reveal", text);
}

function addRipple(el) {
  el.addEventListener("click", function(e) { createRippleAt(el, e); });
}

function createRippleAt(el, e) {
  var rect = el.getBoundingClientRect();
  var r = document.createElement("span");
  var size = Math.max(rect.width, rect.height) * 1.5;
  r.className = "ripple";
  r.style.cssText = "width:" + size + "px;height:" + size + "px;left:" + (e.clientX - rect.left - size/2) + "px;top:" + (e.clientY - rect.top - size/2) + "px";
  el.appendChild(r);
  setTimeout(function() { r.remove(); }, 600);
}

function initCursor() {
  var cursor = document.getElementById("cursor");
  var ring   = document.getElementById("cursor-ring");
  var mx = window.innerWidth/2, my = window.innerHeight/2, rx = mx, ry = my;
  document.addEventListener("mousemove", function(e) {
    mx = e.clientX; my = e.clientY;
    cursor.style.left = mx + "px"; cursor.style.top = my + "px";
  });
  (function animRing() {
    rx += (mx - rx) * 0.13; ry += (my - ry) * 0.13;
    ring.style.left = rx + "px"; ring.style.top = ry + "px";
    requestAnimationFrame(animRing);
  })();
  document.querySelectorAll("a, button, [tabindex]").forEach(function(el) {
    el.addEventListener("mouseenter", function() { document.body.classList.add("hovering"); });
    el.addEventListener("mouseleave", function() { document.body.classList.remove("hovering"); });
  });
}

function initTilt() {
  var profile = document.querySelector(".profile");
  if (!profile) return;
  profile.addEventListener("mousemove", function(e) {
    var rect = profile.getBoundingClientRect();
    var x = (e.clientX - rect.left) / rect.width;
    var y = (e.clientY - rect.top)  / rect.height;
    profile.style.transform = "perspective(900px) rotateX(" + ((y-.5)*7) + "deg) rotateY(" + ((x-.5)*-7) + "deg)";
    profile.style.boxShadow = "0 16px 50px rgba(0,0,0,.5),0 0 32px rgba(201,168,76,.06)";
    var shine = document.getElementById("profile-shine");
    if (shine) { shine.style.setProperty("--mx", (x*100)+"%"); shine.style.setProperty("--my", (y*100)+"%"); }
  });
  profile.addEventListener("mouseleave", function() {
    profile.style.transform = ""; profile.style.boxShadow = "";
  });
}

function initReveal() {
  var io = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add("visible");
        entry.target.querySelectorAll(".skill-fill").forEach(function(f) {
          setTimeout(function() { f.style.width = f.dataset.pct + "%"; }, 120);
        });
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll(".reveal").forEach(function(el) { io.observe(el); });
}

function initParticles() {
  var canvas = document.getElementById("particle-canvas");
  var ctx = canvas.getContext("2d");
  var W, H, pts = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener("resize", resize);
  for (var i = 0; i < 55; i++) {
    pts.push({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, r: Math.random()*1.3+.3, dx: (Math.random()-.5)*.25, dy: (Math.random()-.5)*.25, a: Math.random()*.4+.07 });
  }
  (function draw() {
    ctx.clearRect(0, 0, W, H);
    pts.forEach(function(p) {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
      if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = "rgba(201,168,76," + p.a + ")"; ctx.fill();
    });
    for (var i = 0; i < pts.length; i++) {
      for (var j = i+1; j < pts.length; j++) {
        var dx = pts[i].x-pts[j].x, dy = pts[i].y-pts[j].y, d = Math.sqrt(dx*dx+dy*dy);
        if (d < 110) {
          ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y);
          ctx.strokeStyle = "rgba(201,168,76," + (.055*(1-d/110)) + ")"; ctx.lineWidth = .5; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  })();
}

function initCopyTag() {
  document.getElementById("copy-tag").addEventListener("click", function() {
    var t = CONFIG.username;
    if (navigator.clipboard) { navigator.clipboard.writeText(t).then(function() { showToast("Copied " + t); }); }
    else {
      var ta = document.createElement("textarea"); ta.value = t;
      document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta);
      showToast("Copied " + t);
    }
  });
}

function initTypingBio() {
  var el = document.getElementById("bio-text");
  var cursor = document.getElementById("bio-cursor");
  var text = CONFIG.bio, i = 0;
  function type() {
    if (i <= text.length) { el.textContent = text.slice(0, i); i++; setTimeout(type, 46); }
    else { setTimeout(function() { cursor.style.display = "none"; }, 2000); }
  }
  setTimeout(type, 700);
}

function initVisitorCounter() {
  var el = document.getElementById("visitor-count");
  var key = "d4rk_v2";
  var stored = localStorage.getItem(key);
  var count;
  if (stored) {
    count = parseInt(stored, 10);
    if (!sessionStorage.getItem(key + "_s")) { count++; sessionStorage.setItem(key + "_s", "1"); localStorage.setItem(key, count); }
  } else {
    count = 0;
    localStorage.setItem(key, count); sessionStorage.setItem(key + "_s", "1");
  }
  el.textContent = count.toLocaleString() + " views";
}

function showToast(msg) {
  var c = document.getElementById("toast-container");
  var t = document.createElement("div"); t.className = "toast"; t.textContent = msg;
  c.appendChild(t);
  setTimeout(function() { if (t.parentNode) t.parentNode.removeChild(t); }, 2800);
}
